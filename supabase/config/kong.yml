_format_version: "3.0"
_services:
  - name: postgrest
    url: http://postgrest:3000/
    routes:
      - name: postgrest-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
  - name: gotrue
    url: http://gotrue:9999/
    routes:
      - name: gotrue-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
  - name: realtime
    url: http://realtime:6544/
    routes:
      - name: realtime-route
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
